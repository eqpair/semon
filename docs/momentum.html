<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SEMon Momentum Board</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
    <style>
        #sector-tooltip {
            position: fixed;
            z-index: 100;
            background: #1e293b;
            color: #f1f5f9;
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 6px;
            max-width: 200px;
            pointer-events: none;
            display: none;
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
            white-space: normal;
        }

        /* ── 모바일 헤더 대응 ── */
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .nav-link-sm {
            white-space: nowrap;
        }

        /* ── 패널 테이블 모바일 가로스크롤 ── */
        .panel-table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.4rem !important;
            }

            /* 섹터 카드: 2열 고정 */
            .grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            /* 패널 내부 버튼 줄바꿈 허용 */
            .panel-filter-row {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">

        <!-- HEADER -->
        <header class="mb-8">
            <div class="header-inner">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Momentum Board</h1>
                    <div class="text-sm text-gray-600 mt-1">
                        Last Update (KST): <span id="updated" class="font-medium">-</span>
                    </div>
                </div>
                <div class="nav-links">
                    <a href="./index.html"
                        class="nav-link-sm px-3 py-1 text-xs rounded bg-blue-100 text-blue-700 hover:bg-blue-200 transition-colors font-medium">✳️
                        RRG</a>
                    <a href="./heatmap.html"
                        class="nav-link-sm px-3 py-1 text-xs rounded bg-green-100 text-green-700 hover:bg-green-200 transition-colors font-medium">📊
                        Heatmap</a>
                    <a href="./stats.html" class="nav-link-sm"
                        style="font-size:12px;color:#a78bfa;text-decoration:none;padding:4px 10px;border:1px solid #3b1f6e;border-radius:6px;">📈
                        Stats</a>
                    <span id="market-badge"
                        class="nav-link-sm px-3 py-1 text-xs rounded bg-gray-200 text-gray-700">MARKET CLOSED</span>
                </div>
            </div>
        </header>

        <!-- SEARCH -->
        <div class="mb-6 relative" id="search-wrap">
            <div class="relative inline-block w-full md:w-80">
                <input id="stock-search" type="text" placeholder="🔍 종목명 또는 코드 검색..."
                    class="w-full px-4 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:border-blue-400 shadow-sm"
                    oninput="searchStock(this.value)" onkeydown="if(event.key==='Escape'){closeSearch()}"
                    autocomplete="off">
                <button onclick="closeSearch()" id="search-clear"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden text-xs">✕</button>
            </div>
            <div id="search-results"
                class="absolute z-50 bg-white border border-gray-200 rounded-lg shadow-lg mt-1 w-full md:w-80 hidden max-h-72 overflow-y-auto">
            </div>
        </div>

        <!-- LOADING -->
        <div id="loading" class="bg-white rounded-lg shadow-md p-8 text-center text-gray-500">Loading Data...</div>

        <div id="content" style="display:none;">
            <section class="mb-8">
                <h2 id="sector-summary" class="text-lg font-bold text-gray-800 mb-4">섹터 로딩 중...</h2>
                <div id="heatmap"></div>
            </section>
        </div>
    </div>

    <script>
        const REFRESH_MS = 10 * 60 * 1000
        let currentSector = null
        let currentFilter = "all"
        let allData = null

        async function loadData() {
            try {
                let res = await fetch("./data/signals.json?t=" + Date.now())
                if (!res.ok) throw new Error()
                allData = await res.json()
                render()
            } catch (e) {
                document.getElementById("loading").innerHTML = "<span class='text-red-500'>데이터 로드 실패</span>"
            }
        }

        function render() {
            document.getElementById("loading").style.display = "none"
            document.getElementById("content").style.display = "block"
            document.getElementById("updated").textContent =
                allData.updated_at ? new Date(allData.updated_at.replace(" ", "T")).toLocaleString("ko-KR") : "-"
            const badge = document.getElementById("market-badge")
            const now = new Date()
            const kst = new Date(now.getTime() + (9 * 60 + now.getTimezoneOffset()) * 60000)
            const h = kst.getHours(), m = kst.getMinutes(), d = kst.getDay()
            const isOpen = d >= 1 && d <= 5 && (h > 9 || (h === 9 && m >= 0)) && (h < 15 || (h === 15 && m <= 30))
            badge.textContent = isOpen ? "MARKET OPEN" : "MARKET CLOSED"
            badge.className = isOpen
                ? "nav-link-sm px-3 py-1 text-xs rounded bg-green-100 text-green-700"
                : "nav-link-sm px-3 py-1 text-xs rounded bg-gray-200 text-gray-700"
            const _sectors = allData.sectors || {}
            const _sectorCount = Object.keys(_sectors).length
            const _stockCount = Object.values(_sectors).reduce((s, d) => s + (d.candidates?.length ?? 0), 0)
            document.getElementById("sector-summary").textContent = `※ ${_sectorCount} 섹터 ${_stockCount} 종목`
            renderHeatmap()
            if (currentSector) {
                const rows = document.querySelectorAll(".inline-panel")
                rows.forEach(p => {
                    if (p.style.display !== "none") {
                        renderPanelTable(parseInt(p.dataset.row), currentSector, currentFilter)
                    }
                })
            }
        }

        const COLS = 6

        function renderHeatmap() {
            const heatmap = document.getElementById("heatmap")
            heatmap.innerHTML = ""
            const sectors = allData.sectors || {}
            const entries = Object.entries(sectors)

            for (let rowStart = 0; rowStart < entries.length; rowStart += COLS) {
                const rowEntries = entries.slice(rowStart, rowStart + COLS)

                const cardRow = document.createElement("div")
                cardRow.className = "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 mb-1"
                cardRow.dataset.row = rowStart

                rowEntries.forEach(([name, data]) => {
                    const card = document.createElement("div")
                    const ret = data.sector_ret_1d
                    const impCount = data.improving_count || 0
                    const lagCount = data.lagging_count || 0
                    const watchCount = data.watch_count || 0
                    const primeCount = data.prime_count || 0
                    const confirmCount = data.confirm_count || 0
                    const badge = primeCount > 0
                        ? `<span class="text-red-600 font-bold">${primeCount} PRIME 🔥</span>`
                        : confirmCount > 0 ? `<span class="text-blue-600 font-medium">${confirmCount} Confirm ★</span>`
                            : watchCount > 0 ? `<span class="text-gray-400 font-medium">${watchCount} Watch</span>`
                                : lagCount > 0 ? `<span class="text-orange-500 font-medium">${lagCount} Lagging</span>` : "<span>-</span>"

                    card.className = "bg-white rounded-lg shadow p-3 hover:shadow-md cursor-pointer transition-all"
                    card.dataset.sector = name
                    card.innerHTML = `
                        <div class="text-sm font-semibold text-gray-800">${name}</div>
                        <div class="text-lg font-bold ${ret > 0 ? "text-green-600" : ret < 0 ? "text-red-600" : "text-gray-500"}">
                            ${ret !== null ? (ret > 0 ? "+" : "") + ret.toFixed(2) + "%" : "-"}
                        </div>
                        <div class="text-xs text-gray-500 flex justify-between">
                            <span>${data.candidates?.length ?? "-"}종목</span>
                            ${badge}
                        </div>`
                    card.onclick = () => selectSector(name, cardRow)
                    cardRow.appendChild(card)
                })

                heatmap.appendChild(cardRow)

                const panel = document.createElement("div")
                panel.className = "inline-panel mb-3"
                panel.dataset.row = rowStart
                panel.style.display = "none"
                panel.innerHTML = `
                    <div class="bg-white rounded-lg shadow-md p-4 border-t-2 border-blue-400">
                        <div class="flex items-center justify-between mb-3 flex-wrap gap-2 panel-filter-row">
                            <div class="flex items-center gap-3">
                                <span id="panel-label-${rowStart}" class="text-sm font-semibold text-blue-600"></span>
                                <button onclick="togglePanelMembers(${rowStart})" class="text-xs text-gray-400 hover:text-gray-600">
                                    <span id="panel-members-arrow-${rowStart}">▶</span> 구성 종목
                                </button>
                            </div>
                            <div class="flex gap-1 flex-wrap items-center">
                                <button class="px-2 py-1 text-xs bg-yellow-100 text-yellow-700 rounded" onclick="setPanelFilter(${rowStart},'all')">ALL</button>
                                <button class="px-2 py-1 text-xs bg-blue-100 text-blue-700 rounded font-medium" onclick="setPanelFilter(${rowStart},'improving')">Improving ★</button>
                                <button class="px-2 py-1 text-xs bg-gray-200 text-gray-700 rounded" onclick="setPanelFilter(${rowStart},'lagging')">Lagging</button>
                                <button class="px-2 py-1 text-xs bg-orange-100 text-orange-700 rounded" onclick="setPanelFilter(${rowStart},'weakening')">Weakening</button>
                                <button onclick="closePanel(${rowStart})" class="text-gray-400 hover:text-gray-600 ml-1 text-sm font-medium">✕</button>
                            </div>
                        </div>
                        <div id="panel-members-${rowStart}" style="display:none;" class="mb-3 p-2 bg-gray-50 rounded text-xs text-gray-600 leading-6"></div>
                        <div class="panel-table-wrap">
                            <table class="min-w-full text-sm text-gray-700">
                                <thead>
                                    <tr class="bg-gray-50 text-gray-600 text-xs">
                                        <th class="px-3 py-2 text-left">종목명</th>
                                        <th class="px-3 py-2 text-right">코드</th>
                                        <th class="px-3 py-2 text-right">현재가</th>
                                        <th class="px-3 py-2 text-right">1D</th>
                                        <th class="px-3 py-2 text-right">1W</th>
                                        <th class="px-3 py-2 text-right">1M</th>
                                        <th class="px-3 py-2 text-right">GAP</th>
                                        <th class="px-3 py-2 text-right">RS-R</th>
                                        <th class="px-3 py-2 text-right">RS-M</th>
                                        <th class="px-3 py-2 text-right">RS-5</th>
                                        <th class="px-3 py-2 text-right">VOL</th>
                                        <th class="px-3 py-2 text-right">신호</th>
                                        <th class="px-3 py-2 text-right" title="섹터+종목 복합 점수 (0~3)">⚡</th>
                                    </tr>
                                </thead>
                                <tbody id="panel-tbody-${rowStart}"></tbody>
                            </table>
                        </div>
                    </div>`
                heatmap.appendChild(panel)
            }
        }

        function selectSector(name, cardRow) {
            currentSector = name
            currentFilter = "all"
            const rowStart = parseInt(cardRow.dataset.row)
            document.querySelectorAll(".inline-panel").forEach(p => p.style.display = "none")
            document.querySelectorAll("[data-sector]").forEach(c => c.classList.remove("ring-2", "ring-blue-400"))
            cardRow.querySelector(`[data-sector="${name}"]`).classList.add("ring-2", "ring-blue-400")
            const panel = document.querySelector(`.inline-panel[data-row="${rowStart}"]`)
            panel.style.display = "block"
            document.getElementById(`panel-label-${rowStart}`).innerHTML =
                `<a href="./index.html?sector=${encodeURIComponent(name)}"
                   class="hover:text-blue-400 transition-colors" title="RRG에서 보기">
                   ▸ ${name} 섹터 <span class="text-xs font-normal opacity-60">→ RRG</span>
                 </a>`
            const data = allData.sectors?.[name]
            if (data?.candidates) {
                document.getElementById(`panel-members-${rowStart}`).innerHTML =
                    data.candidates.map(s =>
                        `<span class="inline-block mr-3">
                            <a href="https://finance.naver.com/item/main.naver?code=${s.code}"
                               target="_blank" class="hover:underline text-gray-700">${s.name}</a>
                            <span class="text-gray-400">(${s.code})</span>
                        </span>`
                    ).join("")
            }
            renderPanelTable(rowStart, name, "all")
            setTimeout(() => panel.scrollIntoView({ behavior: "smooth", block: "nearest" }), 50)
        }

        function closePanel(rowStart) {
            document.querySelector(`.inline-panel[data-row="${rowStart}"]`).style.display = "none"
            document.querySelectorAll("[data-sector]").forEach(c => c.classList.remove("ring-2", "ring-blue-400"))
            currentSector = null
        }

        function togglePanelMembers(rowStart) {
            const panel = document.getElementById(`panel-members-${rowStart}`)
            const arrow = document.getElementById(`panel-members-arrow-${rowStart}`)
            const isOpen = panel.style.display !== "none"
            panel.style.display = isOpen ? "none" : "block"
            arrow.textContent = isOpen ? "▶" : "▼"
        }

        function setPanelFilter(rowStart, filter) {
            currentFilter = filter
            renderPanelTable(rowStart, currentSector, filter)
        }

        function renderPanelTable(rowStart, sectorName, filter) {
            const data = allData.sectors?.[sectorName]
            const tbody = document.getElementById(`panel-tbody-${rowStart}`)
            if (!data?.candidates) {
                tbody.innerHTML = '<tr><td colspan="13" class="text-center py-4 text-gray-400">데이터 없음</td></tr>'
                return
            }
            let list = [...data.candidates]
            if (filter !== "all") list = list.filter(s => s.signal === filter || s.quadrant === filter)
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="13" class="text-center py-4 text-gray-400">신호 없음</td></tr>'
                return
            }
            const fmt = v => v != null ? (v > 0 ? "+" : "") + v.toFixed(2) + "%" : "-"
            tbody.innerHTML = list.map(s => {
                const isPrime = s.signal === "prime"
                const isConfirm = s.signal === "confirm"
                const isImproving = isPrime || isConfirm
                const isLagging = s.quadrant === "lagging"
                const isBreakout = s.short_rs_grade === "breakout"
                const rowClass = isPrime ? "border-b bg-red-50 font-medium"
                    : isConfirm ? "border-b bg-blue-50 font-medium"
                        : isBreakout ? "border-b bg-purple-50 font-medium"
                            : isLagging ? "border-b bg-yellow-50"
                                : "border-b hover:bg-gray-50"
                const naverUrl = `https://finance.naver.com/item/main.naver?code=${s.code}`
                const r1c = s.ret_1d > 0 ? "text-green-600" : "text-red-600"
                const r5c = s.ret_5d > 0 ? "text-green-600" : "text-red-600"
                const r20c = s.ret_20d > 0 ? "text-green-600" : "text-red-600"
                return `
<tr class="${rowClass}">
  <td class="px-3 py-2">
    ${isPrime ? '<span class="text-red-500 mr-1">🔥</span>'
                        : isConfirm ? '<span class="text-blue-500 mr-1">★</span>'
                            : isBreakout ? '<span class="text-purple-500 mr-1">⚡</span>'
                                : isLagging ? '<span class="text-yellow-500 mr-1">●</span>' : ''}
    <a href="${naverUrl}" target="_blank" class="hover:underline ${isImproving ? "text-blue-800" : "text-gray-800"}">${s.name}</a>
  </td>
  <td class="px-3 py-2 text-right text-gray-500 text-xs">${s.code}</td>
  <td class="px-3 py-2 text-right font-medium">${s.price ? s.price.toLocaleString() : "-"}</td>
  <td class="px-3 py-2 text-right ${r1c}">${fmt(s.ret_1d)}</td>
  <td class="px-3 py-2 text-right ${r5c}">${fmt(s.ret_5d)}</td>
  <td class="px-3 py-2 text-right ${r20c}">${fmt(s.ret_20d)}</td>
  <td class="px-3 py-2 text-right ${s.gap_1d >= 3 ? 'text-purple-600 font-medium' : s.gap_1d != null && s.gap_1d < 0 ? 'text-red-500' : 'text-gray-600'}">${s.gap_1d != null ? (s.gap_1d > 0 ? '+' : '') + s.gap_1d.toFixed(1) + '%' : '-'}</td>
  <td class="px-3 py-2 text-right ${s.rs_ratio != null && s.rs_ratio < 100 ? "text-red-500 font-medium" : "text-gray-600"}">${s.rs_ratio != null ? s.rs_ratio.toFixed(2) : "-"}</td>
  <td class="px-3 py-2 text-right ${s.rs_momentum != null && s.rs_momentum >= 100 ? "text-blue-600 font-medium" : "text-gray-600"}">${s.rs_momentum != null ? s.rs_momentum.toFixed(2) : "-"}</td>
  <td class="px-3 py-2 text-right ${s.rs_5d >= 2 ? 'text-purple-600 font-medium' : 'text-gray-600'}">${s.rs_5d != null ? s.rs_5d.toFixed(1) + 'x' : '-'}</td>
  <td class="px-3 py-2 text-right ${s.vol_ratio != null && s.vol_ratio < 0.7 ? "text-gray-400" : "text-gray-600"}">${s.vol_ratio != null ? s.vol_ratio.toFixed(2) + 'x' : "-"}</td>
  <td class="px-3 py-2 text-right">${s.short_rs_grade === 'breakout' ? signalPill('breakout') : signalPill(s.signal || s.quadrant)}</td>
  <td class="px-3 py-2 text-right">
    ${s.combo_score >= 3 ? '<span class="text-red-600 font-bold text-xs">★★★</span>'
                        : s.combo_score === 2 ? '<span class="text-blue-500 font-medium text-xs">★★</span>'
                            : s.combo_score === 1 ? '<span class="text-gray-400 text-xs">★</span>'
                                : '<span class="text-gray-200 text-xs">-</span>'}
  </td>
</tr>`
            }).join("")
        }

        function signalPill(signal) {
            const map = {
                prime: `<span class="px-2 py-1 text-xs bg-red-100 text-red-700 rounded font-bold">PRIME 🔥</span>`,
                confirm: `<span class="px-2 py-1 text-xs bg-blue-100 text-blue-700 rounded font-bold">Confirm ★</span>`,
                watch: `<span class="px-2 py-1 text-xs bg-gray-200 text-gray-700 rounded">Watch</span>`,
                lagging: `<span class="px-2 py-1 text-xs bg-yellow-100 text-yellow-700 rounded">Lagging</span>`,
                weakening: `<span class="px-2 py-1 text-xs bg-orange-100 text-orange-700 rounded">Weakening</span>`,
                leading: `<span class="px-2 py-1 text-xs bg-green-100 text-green-700 rounded">Leading</span>`,
                breakout: `<span class="px-2 py-1 text-xs bg-purple-100 text-purple-700 rounded font-bold">⚡ Breakout</span>`,
            }
            return map[signal] || `<span class="text-gray-400">-</span>`
        }

        function searchStock(query) {
            const results = document.getElementById("search-results")
            const clearBtn = document.getElementById("search-clear")
            clearBtn.classList.toggle("hidden", !query)
            if (!query || query.length < 1) { results.classList.add("hidden"); return }
            const matches = []
            const sectors = allData?.sectors || {}
            Object.entries(sectors).forEach(([sectorName, data]) => {
                (data.candidates || []).forEach(s => {
                    if (s.name.includes(query) || s.code.includes(query)) matches.push({ ...s, sectorName })
                })
            })
            if (!matches.length) {
                results.innerHTML = '<div class="px-4 py-3 text-sm text-gray-400">검색 결과 없음</div>'
                results.classList.remove("hidden"); return
            }
            results.innerHTML = matches.slice(0, 10).map(s => {
                const isImproving = s.signal === "improving"
                const isWatch = s.signal === "watch"
                return `
                <div class="px-4 py-2.5 hover:bg-gray-50 cursor-pointer border-b border-gray-50 last:border-0"
                     onclick="goToStock('${s.sectorName}', '${s.code}')">
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-medium ${isImproving ? 'text-blue-700' : isWatch ? 'text-gray-500' : 'text-gray-800'}">
                            ${isImproving ? '★ ' : isWatch ? '◎ ' : ''}${s.name}
                        </span>
                        <span class="text-xs text-gray-400">${s.code}</span>
                    </div>
                    <div class="flex items-center gap-2 mt-0.5">
                        <span class="text-xs text-gray-400">${s.sectorName}</span>
                        ${signalPill(s.signal || s.quadrant)}
                    </div>
                </div>`
            }).join("")
            results.classList.remove("hidden")
        }

        function goToStock(sectorName, code) {
            closeSearch()
            const sectorKeys = Object.keys(allData?.sectors || {})
            const sectorIdx = sectorKeys.indexOf(sectorName)
            if (sectorIdx === -1) return
            const rowStart = Math.floor(sectorIdx / COLS) * COLS
            const panel = document.querySelector(`.inline-panel[data-row="${rowStart}"]`)
            if (!panel || panel.style.display === "none") {
                const cardRow = document.querySelector(`.grid[data-row="${rowStart}"]`)
                if (!cardRow) return
                selectSector(sectorName, cardRow)
            }
            setTimeout(() => {
                document.querySelectorAll(".ring-1.ring-blue-300").forEach(r => r.classList.remove("ring-1", "ring-blue-300"))
                const activePanel = document.querySelector(`.inline-panel[data-row="${rowStart}"]`)
                if (!activePanel) return
                const links = activePanel.querySelectorAll(`a[href*="code=${code}"]`)
                links.forEach(link => {
                    const row = link.closest("tr")
                    if (row) { row.classList.add("ring-1", "ring-blue-300"); row.scrollIntoView({ behavior: "smooth", block: "nearest" }) }
                })
            }, 300)
        }

        function closeSearch() {
            document.getElementById("stock-search").value = ""
            document.getElementById("search-results").classList.add("hidden")
            document.getElementById("search-clear").classList.add("hidden")
        }

        document.addEventListener("click", e => {
            if (!document.getElementById("search-wrap")?.contains(e.target))
                document.getElementById("search-results")?.classList.add("hidden")
        })

        loadData()
        setInterval(loadData, REFRESH_MS)
    </script>

    <div id="sector-tooltip"></div>
    <script>
        const SECTOR_DESC = {
            "반도체_대형": "메모리 가격·HBM 수요",
            "반도체_중소형": "팹리스·후공정·소형 반도체 업황",
            "반도체_장비": "반도체 설비투자(CAPEX) 사이클",
            "반도체_소재부품": "소재 가격·수율·반도체 업황",

            const card = e.target.closest('[data-sector]')
            if (!card) return
            const desc = SECTOR_DESC[card.dataset.sector]
            if (!desc) return
            _tip.textContent = desc
            _tip.style.display = 'block'
        })
        document.addEventListener('mousemove', e => {
            _tip.style.left = (e.clientX + 14) + 'px'
            _tip.style.top = (e.clientY + 14) + 'px'
        })
        document.addEventListener('mouseout', e => {
            if (e.target.closest('[data-sector]')) _tip.style.display = 'none'
        })
