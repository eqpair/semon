<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Constituents' Momentum</title>
  <link rel="icon" href="./favicon.svg" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
</head>

<body class="bg-gray-100 min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <!-- HEADER -->
    <header class="mb-8">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-bold text-gray-800">Sector Momentum Overview</h1>
          <div class="text-sm text-gray-600 mt-1">
            Last Update (KST):
            <span id="updated" class="font-medium">-</span>
          </div>
        </div>
        <div class="text-right">
          <span id="market-badge" class="px-3 py-1 text-xs rounded bg-gray-200 text-gray-700">
            MARKET CLOSED
          </span>
        </div>
      </div>
    </header>

    <!-- LOADING -->
    <div id="loading" class="bg-white rounded-lg shadow-md p-8 text-center text-gray-500">
      Loading Data...
    </div>
    <div id="content" style="display:none;">

      <!-- SECTOR HEATMAP -->
      <section class="mb-8">
        <h2 class="text-lg font-bold text-gray-800 mb-4">
          섹터 현황
        </h2>
        <div id="heatmap" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
        </div>
      </section>

      <!-- TABLE SECTION -->
      <section id="lagging-section" style="display:none;">
        <h2 class="text-lg font-bold text-gray-800 mb-2">
          종목 상세
        </h2>
        <div class="flex items-center gap-3 mb-2">
          <div id="sector-label" class="text-sm text-blue-600"></div>
          <span class="text-xs text-gray-400">▶ 구성종목</span>
        </div>
        <div id="members-panel" class="mb-4 p-3 bg-gray-50 rounded-lg text-xs text-gray-600 leading-6">
          <!-- 데이터 여기에 채워짐 -->
        </div>
        <!-- 항상 표시 -->
        <div id="members-panel" class="mb-4 p-3 bg-gray-50 rounded-lg text-xs text-gray-600 leading-6">
          <!-- 구성종목 데이터 로드 -->
        </div>
        <!-- FILTER -->
        <div id="filter-bar" class="flex gap-2 mb-4">
          <button class="px-3 py-1 text-xs bg-yellow-100 text-yellow-700 rounded" data-filter="all"
            onclick="setFilter('all')">
            ALL
          </button>
          <button class="px-3 py-1 text-xs bg-gray-200 text-gray-700 rounded" data-filter="lagging"
            onclick="setFilter('lagging')">
            LAGGING
          </button>
          <button class="px-3 py-1 text-xs bg-gray-200 text-gray-700 rounded" data-filter="watch"
            onclick="setFilter('watch')">
            WATCH
          </button>
        </div>

        <!-- TABLE -->
        <div class="bg-white rounded-lg shadow-md p-4">
          <div class="overflow-x-auto">
            <table class="min-w-full text-sm text-gray-700">
              <thead>
                <tr class="bg-gray-100 text-gray-800">
                  <th class="px-3 py-2 text-left">종목명</th>
                  <th class="px-3 py-2 text-right">코드</th>
                  <th class="px-3 py-2 text-right">현재가</th>
                  <th class="px-3 py-2 text-right">1D</th>
                  <th class="px-3 py-2 text-right">5D</th>
                  <th class="px-3 py-2 text-right">RS5</th>
                  <th class="px-3 py-2 text-right">RS20</th>
                  <th class="px-3 py-2 text-right">RS60</th>
                  <th class="px-3 py-2 text-right">VOL</th>
                  <th class="px-3 py-2 text-right">SIGNAL</th>
                </tr>
              </thead>
              <tbody id="stock-tbody">
                <tr>
                  <td colspan="9" class="text-center py-4">
                    Loading…
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const DATA_URL = "./data/signals.json"
    const REFRESH_MS = 10 * 60 * 1000
    let currentSector = null
    let currentFilter = "all"
    let allData = null
    async function loadData() {
      try {
        const res = await fetch(DATA_URL + "?t=" + Date.now())
        if (!res.ok) throw new Error()
        allData = await res.json()
        render()
      }
      catch (e) {
        document.getElementById("loading").innerHTML =
          "<span class='text-red-500'>데이터 로드 실패</span>"
      }
    }

    function render() {
      document.getElementById("loading").style.display = "none"
      document.getElementById("content").style.display = "block"
      document.getElementById("updated").textContent =
        allData.updated_at
          ? allData.updated_at.slice(11, 16)
          : "-"
      const badge = document.getElementById("market-badge")
      const now = new Date()
      const h = now.getHours()
      const m = now.getMinutes()
      const d = now.getDay()
      const isOpen =
        d >= 1 && d <= 5 &&
        (h > 9 || (h === 9 && m >= 0)) &&
        (h < 15 || (h === 15 && m <= 30))
      badge.textContent = isOpen ? "MARKET OPEN" : "MARKET CLOSED"
      badge.className =
        isOpen
          ? "px-3 py-1 text-xs rounded bg-green-100 text-green-700"
          : "px-3 py-1 text-xs rounded bg-gray-200 text-gray-700"
      renderHeatmap()
      if (currentSector) renderTable(currentSector)
    }

    function renderHeatmap() {
      const heatmap = document.getElementById("heatmap")
      heatmap.innerHTML = ""
      const sectors = allData.sectors || {}
      Object.entries(sectors).forEach(([name, data]) => {
        const card = document.createElement("div")
        const ret = data.sector_ret_5d
        const lagCount = data.lagging_count || 0
        card.className =
          "bg-white rounded-lg shadow p-3 hover:shadow-md cursor-pointer"
        card.innerHTML =
          `<div class="text-sm font-semibold text-gray-800">${name}</div>
<div class="text-lg font-bold ${ret > 0 ? "text-green-600" :
            ret < 0 ? "text-red-600" : "text-gray-500"
          }">
${ret !== null ? (ret > 0 ? "+" : "") + ret.toFixed(2) + "%" : "-"}
</div>
<div class="text-xs text-gray-500 flex justify-between">

<span>
${data.rising_ratio ? Math.round(data.rising_ratio * 100) + "% 종목 상승" : "-"}
</span>

<span>
${lagCount > 0 ? lagCount + " Lagging" : "-"}
</span>

</div>`
        card.onclick = () => selectSector(name)
        heatmap.appendChild(card)
      })
    }
    function selectSector(name) {
      currentSector = name
      currentFilter = "all"
      document.getElementById("lagging-section").style.display = "block"
      document.getElementById("sector-label").textContent = "▸ " + name + " 섹터"
      // 구성종목 패널 닫기
      document.getElementById("members-panel").style.display = "none"
      document.getElementById("members-arrow").textContent = "▶"
      // 구성종목 목록 채우기
      const data = allData.sectors?.[name]
      if (data && data.candidates) {
        const panel = document.getElementById("members-panel")
        panel.innerHTML = data.candidates.map(s =>
          `<span class="inline-block mr-3">
            <a href="https://finance.naver.com/item/main.naver?code=${s.code}"
               target="_blank" class="hover:underline text-gray-700">${s.name}</a>
            <span class="text-gray-400">(${s.code})</span>
          </span>`
        ).join("")
      }
      renderTable(name)
    }

    function loadMembers() {
      const panel = document.getElementById('members-panel');
      // 기존에 있던 데이터 로딩 로직 그대로 사용
      panel.style.display = 'block';  // 항상 보이게
      panel.innerHTML = '삼성전자 +1.8%\nSK하이닉스 +2.4%'; // 실제 데이터

      // lagging-section이 보일 때 자동 실행
      document.getElementById('lagging-section').style.display = 'block';
    }

    function renderTable(sectorName) {
      const data = allData.sectors?.[sectorName]
      const tbody = document.getElementById("stock-tbody")
      if (!data || !data.candidates) {
        tbody.innerHTML =
          '<tr><td colspan="10" class="text-center py-4">데이터 없음</td></tr>'
        return
      }
      let list = data.candidates
      if (currentFilter !== "all")
        list = list.filter(s => s.signal === currentFilter)
      if (list.length === 0) {
        tbody.innerHTML =
          '<tr><td colspan="10" class="text-center py-4">신호 없음</td></tr>'
        return
      }
      tbody.innerHTML = list.map(s => {
        const fmt = (v) => v !== null ? (v > 0 ? "+" : "") + v.toFixed(2) + "%" : "-"
        const ret1 = fmt(s.ret_1d)
        const ret5 = fmt(s.ret_5d)
        const isLagging = s.signal === "lagging"
        const rowClass = isLagging
          ? "border-b bg-yellow-50 hover:bg-yellow-100 font-medium"
          : "border-b hover:bg-gray-50"
        const naverUrl = `https://finance.naver.com/item/main.naver?code=${s.code}`
        return `
<tr class="${rowClass}">
<td class="px-3 py-2">
  ${isLagging ? '<span class="text-yellow-500 mr-1">●</span>' : ''}
  <a href="${naverUrl}" target="_blank"
     class="hover:underline ${isLagging ? "text-yellow-800" : "text-gray-800"}">
    ${s.name}
  </a>
</td>
<td class="px-3 py-2 text-right text-gray-500">${s.code}</td>
<td class="px-3 py-2 text-right font-medium">
  ${s.price ? s.price.toLocaleString() : "-"}
</td>
<td class="px-3 py-2 text-right ${s.ret_1d > 0 ? "text-green-600" : s.ret_1d < 0 ? "text-red-600" : "text-gray-500"}">
  ${ret1}
</td>
<td class="px-3 py-2 text-right ${s.ret_5d > 0 ? "text-green-600" : "text-red-600"}">
  ${ret5}
</td>
<td class="px-3 py-2 text-right ${s.rs_5d !== null && s.rs_5d < 0.85 ? "text-red-500 font-medium" : ""}">${rsCell(s.rs_5d)}</td>
<td class="px-3 py-2 text-right ${s.rs_20d !== null && s.rs_20d < 0.90 ? "text-red-500 font-medium" : ""}">${rsCell(s.rs_20d)}</td>
<td class="px-3 py-2 text-right">${rsCell(s.rs_60d)}</td>
<td class="px-3 py-2 text-right ${s.vol_ratio !== null && s.vol_ratio < 0.70 ? "text-gray-400" : ""}">${volCell(s.vol_ratio)}</td>
<td class="px-3 py-2 text-right">${signalPill(s.signal)}</td>
</tr>`
      }).join("")
    }
    function rsCell(v) {
      if (v === null) return "-"
      return v.toFixed(2)
    }

    function volCell(v) {
      if (v === null) return "-"
      return v.toFixed(2)
    }

    function signalPill(signal) {
      if (signal === "lagging")
        return `<span class="px-2 py-1 text-xs bg-yellow-100 text-yellow-700 rounded">LAGGING</span>`
      if (signal === "watch")
        return `<span class="px-2 py-1 text-xs bg-gray-200 text-gray-700 rounded">WATCH</span>`
      return `<span class="text-gray-400">-</span>`
    }

    function setFilter(filter) {
      currentFilter = filter
      if (currentSector) renderTable(currentSector)
    }

    loadData()
    setInterval(loadData, REFRESH_MS)
  </script>
</body>

</html>
