<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SEMon 실적캘린더</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        .cell {
            min-height: 88px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 6px;
            cursor: pointer;
            overflow: hidden;
            transition: all .12s
        }

        .cell:hover {
            border-color: #a5b4fc;
            box-shadow: 0 1px 4px rgba(99, 102, 241, .08)
        }

        .cell.today {
            border: 2px solid #534AB7
        }

        .cell.active {
            background: #f5f3ff;
            border-color: #534AB7
        }

        .cell.empty {
            background: transparent;
            border-color: transparent;
            cursor: default;
            box-shadow: none
        }

        .cell-num {
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 3px
        }

        .cell.today .cell-num {
            color: #534AB7
        }

        .cell.active .cell-num {
            color: #534AB7
        }

        .pill {
            display: inline-block;
            font-size: 9px;
            font-weight: 600;
            border-radius: 4px;
            padding: 1px 5px;
            margin: 1px 1px 0 0;
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            max-width: 100%;
            text-overflow: ellipsis
        }

        .p-y {
            background: #dbeafe;
            color: #1e40af
        }

        .p-g {
            background: #dcfce7;
            color: #14532d
        }

        .p-b {
            background: #ede9fe;
            color: #4c1d95
        }

        .more {
            font-size: 9px;
            color: #9ca3af;
            margin-top: 2px
        }

        .dow-hdr {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            margin-bottom: 4px
        }

        .dow-hdr div {
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            padding: 4px 0;
            font-weight: 600;
            letter-spacing: .04em
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            border-radius: 8px;
            border: 1px solid #f3f4f6;
            margin-bottom: 4px;
            background: #fff;
            transition: background .1s
        }

        .list-item:hover {
            background: #f9fafb
        }

        .li-date {
            font-size: 11px;
            color: #9ca3af;
            min-width: 36px;
            flex-shrink: 0
        }

        .li-name {
            font-size: 13px;
            font-weight: 500;
            color: #111827;
            flex: 1
        }

        .nav-link {
            font-size: 11px;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 500;
            transition: all .15s
        }

        @media(max-width:640px) {
            .cal-grid {
                gap: 2px
            }

            .cell {
                min-height: 64px;
                padding: 4px
            }

            .hide-mobile {
                display: none
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <div class="container mx-auto px-4 py-6 max-w-4xl">

        <!-- 헤더 -->
        <header class="mb-6">
            <div class="flex justify-between items-start flex-wrap gap-3">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">실적발표 캘린더</h1>
                    <div class="text-sm text-gray-500 mt-1">Last Update: <span id="updated"
                            class="font-medium text-gray-700">-</span></div>
                </div>
                <div class="flex items-center gap-2 flex-wrap">
                    <a href="./index.html" class="nav-link bg-blue-100 text-blue-700 hover:bg-blue-200">✳️ RRG</a>
                    <a href="./momentum.html" class="nav-link bg-blue-100 text-blue-700 hover:bg-blue-200">▶
                        Momentum</a>
                    <a href="./heatmap.html" class="nav-link bg-green-100 text-green-700 hover:bg-green-200">📊
                        Heatmap</a>
                    <a href="./stats.html"
                        style="font-size:11px;color:#a78bfa;text-decoration:none;padding:4px 10px;border:1px solid #3b1f6e;border-radius:6px;font-weight:500;">📈
                        Stats</a>
                </div>
            </div>
        </header>

        <!-- 월 네비 + 통계 -->
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 mb-4">
            <div class="flex items-center justify-between mb-4">
                <button onclick="changeMonth(-1)"
                    class="px-3 py-1.5 text-sm text-gray-500 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">←
                    이전</button>
                <div class="text-center">
                    <div class="text-lg font-bold text-gray-800" id="hdr-title">-</div>
                </div>
                <button onclick="changeMonth(1)"
                    class="px-3 py-1.5 text-sm text-gray-500 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">다음
                    →</button>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div class="text-center bg-gray-50 rounded-lg py-2 px-3">
                    <div class="text-xl font-bold text-gray-800" id="s-total">-</div>
                    <div class="text-xs text-gray-400 mt-0.5">이번달 종목</div>
                </div>
                <div class="text-center bg-blue-50 rounded-lg py-2 px-3">
                    <div class="text-xl font-bold text-blue-700" id="s-yeon">-</div>
                    <div class="text-xs text-blue-400 mt-0.5">연결</div>
                </div>
                <div class="text-center bg-green-50 rounded-lg py-2 px-3">
                    <div class="text-xl font-bold text-green-700" id="s-gae">-</div>
                    <div class="text-xs text-green-400 mt-0.5">개별</div>
                </div>
            </div>
        </div>

        <!-- 범례 -->
        <div class="flex gap-4 mb-3 px-1">
            <span class="flex items-center gap-1.5 text-xs text-gray-500"><span class="pill p-y">연결</span> 연결재무제표</span>
            <span class="flex items-center gap-1.5 text-xs text-gray-500"><span class="pill p-g">개별</span> 개별재무제표</span>
            <span class="flex items-center gap-1.5 text-xs text-gray-500"><span class="pill p-b">연결, 개별</span> 양식
                병행</span>
        </div>

        <!-- 달력 -->
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-3 mb-4">
            <div class="dow-hdr">
                <div>월</div>
                <div>화</div>
                <div>수</div>
                <div>목</div>
                <div>금</div>
            </div>
            <div class="cal-grid" id="cal"></div>
        </div>

        <!-- 리스트 -->
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
            <div class="flex items-center justify-between mb-3">
                <div class="text-sm font-semibold text-gray-700" id="list-title">전체 목록</div>
                <div class="text-xs text-gray-400" id="list-count"></div>
            </div>
            <div id="list"></div>
        </div>

        <div class="text-xs text-gray-400 text-center mt-4">
            데이터 출처: WiseReport 어닝스캘린더 · 매일 오전 7시 자동 갱신
        </div>

    </div>

    <script>
        let DATA = null, curY, curM, selDay = null;
        const today = new Date();

        function pillClass(t) {
            if (t.includes('연결') && t.includes('개별')) return 'p-b';
            if (t.includes('연결')) return 'p-y';
            return 'p-g';
        }
        function byMonth(y, m) {
            if (!DATA) return [];
            return DATA.earnings.filter(e => { const d = new Date(e.date); return d.getFullYear() === y && d.getMonth() === m });
        }
        function byDay(y, m, d) {
            if (!DATA) return [];
            const key = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            return DATA.earnings.filter(e => e.date === key);
        }
        function changeMonth(dir) {
            curM += dir;
            if (curM > 11) { curM = 0; curY++ }
            if (curM < 0) { curM = 11; curY-- }
            selDay = null; render();
        }
        function render() {
            const MN = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
            document.getElementById('hdr-title').textContent = `${curY}년 ${MN[curM]}`;
            const monthData = byMonth(curY, curM);
            const yeon = monthData.filter(e => e.type.includes('연결')).length;
            document.getElementById('s-total').textContent = monthData.length;
            document.getElementById('s-yeon').textContent = yeon;
            document.getElementById('s-gae').textContent = monthData.length - yeon;

            const cal = document.getElementById('cal');
            cal.innerHTML = '';
            const first = new Date(curY, curM, 1).getDay();
            const offset = first === 0 ? 4 : first - 1;
            const dim = new Date(curY, curM + 1, 0).getDate();

            for (let i = 0; i < Math.min(offset, 4); i++) {
                const el = document.createElement('div');
                el.className = 'cell empty';
                cal.appendChild(el);
            }
            for (let d = 1; d <= dim; d++) {
                const dow = new Date(curY, curM, d).getDay();
                if (dow === 0 || dow === 6) continue;
                const items = byDay(curY, curM, d);
                const el = document.createElement('div');
                const isToday = today.getFullYear() === curY && today.getMonth() === curM && today.getDate() === d;
                el.className = 'cell' + (isToday ? ' today' : '') + (selDay === d ? ' active' : '');
                const MAX = 3;
                let html = `<div class="cell-num">${d}</div>`;
                items.slice(0, MAX).forEach(e => {
                    html += `<span class="pill ${pillClass(e.type)}">${e.name}</span>`;
                });
                if (items.length > MAX) html += `<div class="more">+${items.length - MAX}개</div>`;
                el.innerHTML = html;
                el.onclick = () => { selDay = (selDay === d) ? null : d; render() };
                cal.appendChild(el);
            }
            renderList();
        }
        function renderList() {
            const MN = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
            const items = selDay ? byDay(curY, curM, selDay) : byMonth(curY, curM);
            document.getElementById('list-title').textContent = selDay ? `${curM + 1}월 ${selDay}일 실적발표` : `${MN[curM]} 전체 목록`;
            document.getElementById('list-count').textContent = `${items.length}개`;
            const list = document.getElementById('list');
            if (!items.length) {
                list.innerHTML = `<div class="text-center py-8 text-sm text-gray-400">일정이 없습니다</div>`;
                return;
            }
            list.innerHTML = items.map(e => {
                const d = new Date(e.date);
                const naverUrl = `https://finance.naver.com/item/main.naver?code=`;
                return `<div class="list-item">
      <div class="li-date">${d.getMonth() + 1}/${d.getDate()}</div>
      <div class="li-name">${e.name}</div>
      <span class="pill ${pillClass(e.type)}">${e.type}</span>
    </div>`;
            }).join('');
        }
        async function init() {
            try {
                const res = await fetch('data/earnings.json');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                DATA = await res.json();
                document.getElementById('updated').textContent = DATA.updated || '-';
                curY = today.getFullYear();
                curM = today.getMonth();
            } catch (e) {
                document.getElementById('list').innerHTML = `<div class="text-center py-6 text-sm text-red-500 bg-red-50 rounded-lg">데이터 로드 실패: ${e.message}</div>`;
                curY = today.getFullYear();
                curM = today.getMonth();
            }
            render();
        }
        init();
    </script>
</body>

</html>
